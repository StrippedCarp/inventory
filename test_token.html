<!DOCTYPE html>
<html>
<head>
    <title>Test Token</title>
</head>
<body>
    <h1>Token Test</h1>
    <button onclick="testToken()">Test Token</button>
    <button onclick="testExport()">Test Export</button>
    <pre id="result"></pre>

    <script>
        function testToken() {
            const token = localStorage.getItem('access_token');
            document.getElementById('result').textContent = 
                'Token exists: ' + !!token + '\n' +
                'Token: ' + (token ? token.substring(0, 50) + '...' : 'null');
        }

        async function testExport() {
            const token = localStorage.getItem('access_token');
            const response = await fetch('http://localhost:5000/api/analytics/export/inventory-report?format=xlsx', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            
            document.getElementById('result').textContent = 
                'Status: ' + response.status + '\n' +
                'OK: ' + response.ok + '\n' +
                'Content-Type: ' + response.headers.get('content-type');
            
            if (!response.ok) {
                const text = await response.text();
                document.getElementById('result').textContent += '\n\nResponse: ' + text;
            }
        }
    </script>
</body>
</html>
